name: Release Linux

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libc6-dev \
            libgl1-mesa-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            pkg-config

      - name: Build Linux/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch }}
          GOOS: linux
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/neko-linux-${GOARCH}" \
            .
          gzip "dist/neko-linux-${GOARCH}"

      - name: Upload Linux asset
        env:
          GH_TOKEN: ${{ github.token }}
          GOARCH: ${{ matrix.goarch }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" "dist/neko-linux-${GOARCH}.gz"
